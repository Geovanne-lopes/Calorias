spring.application.name=calorias

# Credenciais do Oracle ficam em application-local.properties (nao versionado).
# Veja application-local.properties.example na mesma pasta.
spring.profiles.active=local

# CONFIGURACAO PARA O ORACLE DATABASE
spring.flyway.baselineOnMigrate=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# REMOVER O CAMPO "trace" DA RESPOSTA DE ERRO
spring.web.error.include-stacktrace=never
